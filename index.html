<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBM Name Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>IBM Name Generator</h1>
    </header>

    <div class="container">
        <div class="input-section">
            <input type="text" id="textInput" maxlength="50">
            <p class="error-message" id="errorMessage">This character is not supported, only letters</p>
        </div>

        <div class="preview-section" id="previewSection">
            <canvas id="textCanvas"></canvas>
            <button id="downloadBtn" class="download-btn">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M10 13L6 9H8V4H12V9H14L10 13Z" fill="currentColor"/>
                    <path d="M4 14H16V16H4V14Z" fill="currentColor"/>
                </svg>
            </button>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="colorPicker">COLOR</label>
                <input type="color" id="colorPicker" value="#0f62fe">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
